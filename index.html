<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BloomCal — Calendario emocional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="calendar_styles.css" />
  </head>
  <body class="bg-gradient-to-b from-pink-50 via-white to-indigo-50">
    <div class="min-h-screen p-6 relative">
      <div class="decor-blob decor-top"></div>
      <div class="decor-blob decor-bottom"></div>
      <header class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-3xl font-extrabold">BloomCal</h1>
          <p class="text-sm text-gray-600">Tu calendario personal, bonito y emocional</p>
        </div>
        <div class="flex items-center gap-3">
          <button id="newEvent" class="px-4 py-2 rounded-lg bg-pink-400 text-white font-semibold">+ Evento</button>
        </div>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-6 gap-6">
        <section class="col-span-4">
          <div class="calendar-panel glass">
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-3"><button id="prevM">‹</button><div id="monthTitle" class="font-semibold">Mayo 2026</div><button id="nextM">›</button></div>
              <div class="flex items-center gap-2">
                <button data-view="month" class="view-btn active">Mes</button>
                <button data-view="week" class="view-btn">Semana</button>
                <button data-view="day" class="view-btn">Día</button>
              </div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
            <div id="weekView" class="hidden mt-4"></div>
            <div id="dayView" class="hidden mt-4"></div>
          </div>
        </section>
        <aside class="col-span-1 space-y-4">
          <div class="widget glass p-4">
            <div class="text-sm text-gray-500">Hoy</div>
            <div id="todaySummary" class="mt-2 font-semibold">Sin eventos</div>
          </div>
          <div class="widget glass p-4">
            <div class="text-sm text-gray-500">Cuenta atrás</div>
            <div id="countdown" class="mt-2 font-semibold">-</div>
          </div>
          <div class="widget glass p-4">
            <div class="text-sm text-gray-500">Hábitos</div>
            <div id="habits" class="mt-2">Beber agua • Dormir</div>
          </div>
          <div class="widget glass p-4">
            <div class="text-sm text-gray-500">Stickers</div>
            <div id="stickersPanel" class="mt-3 flex gap-2 flex-wrap">
              <div class="sticker" draggable="true" data-sticker="🌸">🌸</div>
              <div class="sticker" draggable="true" data-sticker="✨">✨</div>
              <div class="sticker" draggable="true" data-sticker="☕">☕</div>
              <div class="sticker" draggable="true" data-sticker="💖">💖</div>
              <div class="sticker" draggable="true" data-sticker="🐱">🐱</div>
              <div class="sticker" draggable="true" data-sticker="🌟">🌟</div>
            </div>
          </div>
        </aside>

        <aside class="col-span-1 space-y-4">
          <div class="widget glass p-4">
            <div class="text-sm text-gray-500">Agenda</div>
            <div id="agendaList" class="mt-2 text-sm"></div>
          </div>
          <div class="widget glass p-4">
            <div class="text-sm text-gray-500">Recuerdos del mes</div>
            <div id="memories" class="mt-2 grid grid-cols-2 gap-2"></div>
          </div>
          <div class="widget glass p-4">
            <canvas id="statsChart" width="300" height="200"></canvas>
          </div>
        </aside>
      </main>

      <!-- Editor modal -->
      <div id="eventModal" class="fixed inset-0 flex items-center justify-center hidden z-50">
        <div class="max-w-2xl w-full p-6 rounded-2xl glass">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-semibold">Crear / Editar evento</h3>
            <button id="closeEvent">Cerrar</button>
          </div>
          <form id="eventForm" class="space-y-3">
            <input id="evTitle" class="w-full p-3 rounded-md bg-white/5" placeholder="Título" />
            <input id="evLocation" class="w-full p-2 rounded-md bg-white/5" placeholder="Ubicación (opcional)" />
            <textarea id="evDesc" class="w-full p-3 rounded-md bg-white/5" placeholder="Descripción"></textarea>
            <div class="flex gap-2">
              <input id="evDate" type="date" class="p-2 rounded-md bg-white/5" />
              <input id="evTime" type="time" class="p-2 rounded-md bg-white/5" />
              <input id="evReminder" type="checkbox" /> <label class="text-sm">Recordatorio</label>
            </div>
            <div class="flex gap-2">
              <input id="evColor" type="color" value="#ff8aa2" class="w-12 h-10 p-0 border-0" />
              <input id="evEmoji" placeholder="Emoji" class="p-2 rounded-md bg-white/5 w-16 text-center" />
              <input id="evPhoto" placeholder="URL foto (opcional)" class="p-2 rounded-md bg-white/5 flex-1" />
            </div>
            <input id="evMusic" placeholder="Enlace de música (opcional)" class="w-full p-2 rounded-md bg-white/5" />
            <div>
              <label class="text-sm">Stickers</label>
              <div id="eventStickers" class="flex gap-2 mt-2"></div>
            </div>
            <div>
              <label class="text-sm">Comentarios</label>
              <div id="comments" class="max-h-32 overflow-auto mt-2 text-sm"></div>
              <div class="flex gap-2 mt-2"><input id="newComment" class="flex-1 p-2 rounded-md bg-white/5" placeholder="Escribe un comentario" /><button id="addComment" class="px-3 py-1 rounded-md bg-indigo-400">Añadir</button></div>
            </div>
            <div class="flex justify-between items-center">
              <div>
                <label class="text-sm">Marcar periodo</label>
                <input id="periodStart" type="date" class="p-2 rounded-md bg-white/5 ml-2" />
              </div>
              <div class="flex justify-end gap-2">
                <button type="button" id="saveEvent" class="px-4 py-2 rounded-md bg-pink-400 text-white">Guardar</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="calendar_script.js"></script>
  </body>
</html>
